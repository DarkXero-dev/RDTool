name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            artifact_glob: "src-tauri/target/release/bundle/**/*.AppImage"
          - os: windows-latest
            label: windows
            artifact_glob: "src-tauri/target/release/bundle/**/*.exe"
          - os: macos-latest
            label: macos
            artifact_glob: "src-tauri/target/release/bundle/**/*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            libxdo-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev
          sudo apt-get install -y squashfs-tools
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /dev/fuse

      - name: Install macOS system deps
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Build release binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo packager --release --formats appimage
        working-directory: src-tauri

      - name: Fix AppImage for modern Wayland compositors
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          echo "AppImage: $APPIMAGE"
          chmod +x "$APPIMAGE"

          # Extract (APPIMAGE_EXTRACT_AND_RUN=1 avoids needing FUSE mount)
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract
          echo "Bundled libs:"
          ls squashfs-root/usr/lib/ 2>/dev/null || echo "(none)"

          # Remove bundled display/GL/Wayland libs.
          # linuxdeploy bundles Ubuntu 22.04 versions which are too old for
          # KDE Plasma 6+ / modern Wayland compositors. The binary only needs
          # system-provided GTK3, wayland-client, mesa etc.
          rm -f squashfs-root/usr/lib/lib{gtk,gdk,glib,gobject,gio,gmodule,gthread}*.so* \
                squashfs-root/usr/lib/lib{wayland,X11,xcb,Xcursor,Xcomposite,Xdamage}*.so* \
                squashfs-root/usr/lib/lib{Xext,Xi,Xfixes,Xinerama,Xrandr,Xrender,Xtst}*.so* \
                squashfs-root/usr/lib/lib{EGL,GL,GLX,GLdispatch,GLESv,drm,gbm,epoxy}*.so* \
                squashfs-root/usr/lib/lib{pango,cairo,atk,harfbuzz,pixman,ffi}*.so* \
                squashfs-root/usr/lib/lib{fontconfig,freetype,dbus}*.so*

          # Replace AppRun: do NOT set LD_LIBRARY_PATH so the binary uses
          # host system libs for all display/GL stack
          cat > squashfs-root/AppRun << 'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "${0}")")"
          exec "$APPDIR/usr/bin/rdtool" "$@"
          APPRUN
          chmod +x squashfs-root/AppRun

          # Repack using squashfs-tools (no appimagetool download needed)
          # Download only the small runtime ELF (~40KB plain binary, not an AppImage)
          wget --tries=5 --retry-connrefused -q \
            "https://github.com/AppImage/AppImageKit/releases/download/13/runtime-x86_64" \
            -O /tmp/appimage-runtime
          chmod a+x /tmp/appimage-runtime

          mksquashfs squashfs-root /tmp/stripped.squashfs \
            -root-owned -noappend -comp zstd -b 1048576 2>/dev/null

          # Assemble: runtime ELF + squashfs = AppImage type 2
          cat /tmp/appimage-runtime /tmp/stripped.squashfs > "$APPIMAGE"
          chmod +x "$APPIMAGE"
          # Write AppImage type 2 magic at offset 8
          printf '\x41\x49\x02' | dd bs=1 seek=8 conv=notrunc of="$APPIMAGE" 2>/dev/null

          rm -rf squashfs-root /tmp/stripped.squashfs /tmp/appimage-runtime
          echo "Done: $(ls -lh $APPIMAGE)"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo packager --release --formats nsis
        working-directory: src-tauri

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo packager --release --formats dmg
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdtool-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDTool ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: |
            artifacts/rdtool-linux/**/*.AppImage
            artifacts/rdtool-windows/**/*.exe
            artifacts/rdtool-macos/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
