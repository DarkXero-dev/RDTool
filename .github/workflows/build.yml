name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            artifact_glob: "src-tauri/target/release/bundle/**/*.AppImage"
          - os: windows-latest
            label: windows
            artifact_glob: "src-tauri/target/release/bundle/**/*.exe"
          - os: macos-latest
            label: macos
            artifact_glob: "src-tauri/target/release/bundle/**/*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            libxdo-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev

      - name: Install macOS system deps
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Build release binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo packager --release --formats appimage
        working-directory: src-tauri

      - name: Strip bundled platform libs from AppImage
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract
          # Remove desktop/display/GPU libs - host system must provide these.
          # linuxdeploy bundles Ubuntu 22.04 versions which conflict with newer
          # Wayland compositors (KDE Plasma 6+, GNOME 46+, etc.)
          rm -f \
            squashfs-root/usr/lib/libgtk*.so* \
            squashfs-root/usr/lib/libgdk*.so* \
            squashfs-root/usr/lib/libglib*.so* \
            squashfs-root/usr/lib/libgobject*.so* \
            squashfs-root/usr/lib/libgio*.so* \
            squashfs-root/usr/lib/libgmodule*.so* \
            squashfs-root/usr/lib/libgthread*.so* \
            squashfs-root/usr/lib/libwayland*.so* \
            squashfs-root/usr/lib/libX11*.so* \
            squashfs-root/usr/lib/libxcb*.so* \
            squashfs-root/usr/lib/libXext*.so* \
            squashfs-root/usr/lib/libXi*.so* \
            squashfs-root/usr/lib/libXrender*.so* \
            squashfs-root/usr/lib/libXfixes*.so* \
            squashfs-root/usr/lib/libXcursor*.so* \
            squashfs-root/usr/lib/libXdamage*.so* \
            squashfs-root/usr/lib/libXrandr*.so* \
            squashfs-root/usr/lib/libXcomposite*.so* \
            squashfs-root/usr/lib/libXinerama*.so* \
            squashfs-root/usr/lib/libXtst*.so* \
            squashfs-root/usr/lib/libEGL*.so* \
            squashfs-root/usr/lib/libGL*.so* \
            squashfs-root/usr/lib/libGLX*.so* \
            squashfs-root/usr/lib/libGLdispatch*.so* \
            squashfs-root/usr/lib/libGLESv*.so* \
            squashfs-root/usr/lib/libdrm*.so* \
            squashfs-root/usr/lib/libgbm*.so* \
            squashfs-root/usr/lib/libpango*.so* \
            squashfs-root/usr/lib/libcairo*.so* \
            squashfs-root/usr/lib/libatk*.so* \
            squashfs-root/usr/lib/libepoxy*.so* \
            squashfs-root/usr/lib/libffi*.so* \
            squashfs-root/usr/lib/libharfbuzz*.so* \
            squashfs-root/usr/lib/libpixman*.so* \
            squashfs-root/usr/lib/libfontconfig*.so* \
            squashfs-root/usr/lib/libfreetype*.so* \
            squashfs-root/usr/lib/libdbus*.so*
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo packager --release --formats nsis
        working-directory: src-tauri

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo packager --release --formats dmg
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdtool-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDTool ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: |
            artifacts/rdtool-linux/**/*.AppImage
            artifacts/rdtool-windows/**/*.exe
            artifacts/rdtool-macos/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
