name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            artifact_glob: "src-tauri/target/release/bundle/**/*.AppImage"
          - os: windows-latest
            label: windows
            artifact_glob: "src-tauri/target/release/bundle/**/*.exe"
          - os: macos-latest
            label: macos
            artifact_glob: "src-tauri/target/release/bundle/**/*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse \
            libfuse2 \
            libxdo-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev
          sudo apt-get install -y squashfs-tools
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /dev/fuse

      - name: Install macOS system deps
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-packager
        run: cargo install cargo-packager --version 0.11.8 --locked

      - name: Build release binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo packager --release --formats appimage
        working-directory: src-tauri

      - name: Fix AppImage for modern Wayland compositors
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          echo "AppImage: $APPIMAGE"
          chmod +x "$APPIMAGE"

          # Extract the AppImage runtime ELF (bytes before the squashfs payload).
          # The squashfs magic 'hsqs' marks the start of the filesystem.
          # No external downloads needed - we reuse the runtime from our own AppImage.
          SQFS_OFFSET=$(python3 -c "
          import struct, sys
          data = open('$APPIMAGE','rb').read()
          for i in range(len(data)-4):
              if struct.unpack('<I', data[i:i+4])[0] in (0x73717368, 0x68737173):
                  print(i); sys.exit(0)
          print(0)
          ")
          echo "squashfs offset: $SQFS_OFFSET"
          dd if="$APPIMAGE" bs=1 count="$SQFS_OFFSET" of=/tmp/appimage-runtime 2>/dev/null
          chmod a+x /tmp/appimage-runtime

          # Extract squashfs content (no FUSE needed with APPIMAGE_EXTRACT_AND_RUN)
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract
          echo "Bundled libs: $(ls squashfs-root/usr/lib/ 2>/dev/null | wc -l) files"

          # Remove bundled display/GL/Wayland libs.
          # linuxdeploy bundles Ubuntu 22.04 versions incompatible with Plasma 6+.
          # Our binary only NEEDs system GTK3/wayland/mesa (see objdump -p output).
          find squashfs-root/usr/lib -maxdepth 1 -name '*.so*' \( \
            -name 'libgtk*'    -o -name 'libgdk*'    -o -name 'libglib*'   \
            -o -name 'libgobject*' -o -name 'libgio*' -o -name 'libgmodule*' \
            -o -name 'libgthread*' -o -name 'libwayland*' -o -name 'libX11*' \
            -o -name 'libxcb*'  -o -name 'libXcursor*' -o -name 'libXcomposite*' \
            -o -name 'libXdamage*' -o -name 'libXext*' -o -name 'libXi*'   \
            -o -name 'libXfixes*' -o -name 'libXinerama*' -o -name 'libXrandr*' \
            -o -name 'libXrender*' -o -name 'libXtst*' -o -name 'libEGL*'  \
            -o -name 'libGL*'   -o -name 'libGLX*'    -o -name 'libGLdispatch*' \
            -o -name 'libGLESv*' -o -name 'libdrm*'   -o -name 'libgbm*'  \
            -o -name 'libepoxy*' -o -name 'libpango*'  -o -name 'libcairo*' \
            -o -name 'libatk*'  -o -name 'libharfbuzz*' -o -name 'libpixman*' \
            -o -name 'libffi*'  -o -name 'libfontconfig*' -o -name 'libfreetype*' \
            -o -name 'libdbus*' \
          \) -delete
          echo "Libs after strip: $(ls squashfs-root/usr/lib/ 2>/dev/null | wc -l) files"

          # Replace AppRun: skip LD_LIBRARY_PATH so host system libs are used
          printf '#!/bin/bash\nAPPDIR="$(dirname "$(readlink -f "${0}")")"\nexec "$APPDIR/usr/bin/rdtool" "$@"\n' \
            > squashfs-root/AppRun
          chmod +x squashfs-root/AppRun

          # Repack: new squashfs + original runtime = fixed AppImage
          mksquashfs squashfs-root /tmp/stripped.squashfs \
            -root-owned -noappend -comp zstd -b 1048576 2>/dev/null
          cat /tmp/appimage-runtime /tmp/stripped.squashfs > "$APPIMAGE"
          chmod +x "$APPIMAGE"
          printf '\x41\x49\x02' | dd bs=1 seek=8 conv=notrunc of="$APPIMAGE" 2>/dev/null

          rm -rf squashfs-root /tmp/stripped.squashfs /tmp/appimage-runtime
          echo "Done: $(ls -lh $APPIMAGE)"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo packager --release --formats nsis
        working-directory: src-tauri

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo packager --release --formats dmg
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdtool-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDTool ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: |
            artifacts/rdtool-linux/**/*.AppImage
            artifacts/rdtool-windows/**/*.exe
            artifacts/rdtool-macos/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
