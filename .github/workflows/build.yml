name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            bundles: src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            label: windows
            bundles: src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos
            bundles: src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rdtool-${{ matrix.label }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: rdtool-linux
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: rdtool-windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: rdtool-macos
          path: artifacts/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDTool ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: |
            artifacts/linux/*.AppImage
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
