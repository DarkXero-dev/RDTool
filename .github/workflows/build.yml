name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            installer: src-tauri/target/release/bundle/appimage/*.AppImage
            updater: src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            sigs: src-tauri/target/release/bundle/appimage/*.sig
          - os: windows-latest
            label: windows
            installer: src-tauri/target/release/bundle/nsis/*.exe
            updater: src-tauri/target/release/bundle/nsis/*.nsis.zip
            sigs: src-tauri/target/release/bundle/nsis/*.sig
          - os: macos-latest
            label: macos
            installer: src-tauri/target/release/bundle/dmg/*.dmg
            updater: src-tauri/target/release/bundle/dmg/*.dmg
            sigs: src-tauri/target/release/bundle/dmg/*.sig

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: rdtool-${{ matrix.label }}-installer
          path: ${{ matrix.installer }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload updater artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: rdtool-${{ matrix.label }}-updater
          path: |
            ${{ matrix.updater }}
            ${{ matrix.sigs }}
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate updater manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/DarkXero-dev/RDTool/releases/download/${GITHUB_REF_NAME}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          LINUX_TAR=$(find artifacts/rdtool-linux-updater -name "*.AppImage.tar.gz" | head -1)
          LINUX_SIG=$(find artifacts/rdtool-linux-updater -name "*.AppImage.tar.gz.sig" | head -1)
          WIN_ZIP=$(find artifacts/rdtool-windows-updater -name "*.nsis.zip" | head -1)
          WIN_SIG=$(find artifacts/rdtool-windows-updater -name "*.nsis.zip.sig" | head -1)
          MAC_DMG=$(find artifacts/rdtool-macos-updater -name "*.dmg" | head -1)
          MAC_SIG=$(find artifacts/rdtool-macos-updater -name "*.dmg.sig" | head -1)

          LINUX_FILE=$(basename "$LINUX_TAR" 2>/dev/null || echo "")
          WIN_FILE=$(basename "$WIN_ZIP" 2>/dev/null || echo "")
          MAC_FILE=$(basename "$MAC_DMG" 2>/dev/null || echo "")

          LINUX_SIG_CONTENT=$(cat "$LINUX_SIG" 2>/dev/null || echo "")
          WIN_SIG_CONTENT=$(cat "$WIN_SIG" 2>/dev/null || echo "")
          MAC_SIG_CONTENT=$(cat "$MAC_SIG" 2>/dev/null || echo "")

          python3 - <<PYEOF
          import json
          data = {
            "version": "$VERSION",
            "notes": "See release notes on GitHub",
            "pub_date": "$PUB_DATE",
            "platforms": {}
          }
          if "$LINUX_FILE":
            data["platforms"]["linux-x86_64"] = {
              "url": "$BASE_URL/$LINUX_FILE",
              "signature": """$LINUX_SIG_CONTENT"""
            }
          if "$WIN_FILE":
            data["platforms"]["windows-x86_64"] = {
              "url": "$BASE_URL/$WIN_FILE",
              "signature": """$WIN_SIG_CONTENT"""
            }
          if "$MAC_FILE":
            data["platforms"]["darwin-x86_64"] = {
              "url": "$BASE_URL/$MAC_FILE",
              "signature": """$MAC_SIG_CONTENT"""
            }
            data["platforms"]["darwin-aarch64"] = data["platforms"]["darwin-x86_64"]
          with open("latest.json", "w") as f:
            json.dump(data, f, indent=2)
          print("Generated latest.json")
          PYEOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDTool ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: true
          files: |
            artifacts/rdtool-linux-installer/*.AppImage
            artifacts/rdtool-windows-installer/*.exe
            artifacts/rdtool-macos-installer/*.dmg
            artifacts/rdtool-linux-updater/*.AppImage.tar.gz
            artifacts/rdtool-linux-updater/*.sig
            artifacts/rdtool-windows-updater/*.nsis.zip
            artifacts/rdtool-windows-updater/*.sig
            artifacts/rdtool-macos-updater/*.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
